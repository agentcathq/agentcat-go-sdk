name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24', 'stable']

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Download dependencies
      run: |
        go mod download
        cd mcpgo && go mod download
        cd ../officialsdk && go mod download

    - name: Run tests
      run: |
        go test -v -race -coverprofile=coverage-root.out ./...
        cd mcpgo && go test -v -race -coverprofile=coverage-mcpgo.out ./...
        cd ../officialsdk && go test -v -race -coverprofile=coverage-officialsdk.out ./...

    - name: Upload coverage
      if: matrix.go-version == 'stable'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage-root.out,./mcpgo/coverage-mcpgo.out,./officialsdk/coverage-officialsdk.out
        fail_ci_if_error: false
      continue-on-error: true

  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Check formatting
      run: |
        if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
          echo "The following files are not formatted:"
          gofmt -l .
          echo ""
          echo "Please run 'go fmt ./...' to format your code"
          exit 1
        fi
